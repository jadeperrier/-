<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三謀策書計算器</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --btn-hover: #f1c40f; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; width: 100%; max-width: 380px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: var(--gold); text-align: center; margin-top: 0; margin-bottom: 25px; font-size: 1.4rem; letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 18px; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        button { 
            width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 8px; 
            color: #121212; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover { background: var(--btn-hover); }
        button:active { transform: scale(0.98); }

        .result-box { margin-top: 25px; background: #252525; padding: 20px; border-radius: 10px; border: 1px solid #3d3d3d; text-align: center; }
        .res-title { font-size: 14px; color: #888; margin-bottom: 8px; }
        .res-value { font-size: 26px; color: var(--gold); font-weight: bold; margin-bottom: 15px; }
        .res-time { font-size: 22px; color: #fff; font-weight: 500; }
        .error-msg { color: #ff4d4d; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>策書回復計算器</h2>
    
    <div class="input-group">
        <label>當前策書數量</label>
        <input type="number" id="current" placeholder="例如：10" min="0">
    </div>
    
    <div class="input-group">
        <label>目標策書</label>
        <input type="number" id="target" placeholder="例如：150" min="0">
    </div>

    <div class="input-group">
        <label>剩餘回復時間(分鐘)</label>
        <input type="number" id="remMin" placeholder="例如：25" min="0">
    </div>
    
    <div class="input-group">
        <label>回復時間縮短(%)</label>
        <input type="number" id="reduction" placeholder="無則填 0" min="0">
    </div>

    <button onclick="calculate()">開始計算</button>

    <div class="result-box">
        <div class="res-title">距離目標還需等待</div>
        <div id="waitText" class="res-value">-- 小時 -- 分</div>
        <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
        <div class="res-title">預計回滿時間 (24H制)</div>
        <div id="finishTime" class="res-time">--/-- --:--</div>
    </div>
</div>

<script>
function calculate() {
    // 獲取原始輸入字串
    let cStr = document.getElementById('current').value;
    let tStr = document.getElementById('target').value;
    let rMStr = document.getElementById('remMin').value;
    let redStr = document.getElementById('reduction').value;

    // 1. 必填檢查
    if (cStr === "" || tStr === "" || rMStr === "") {
        alert("請填寫前三個必要欄位！");
        return;
    }

    // 2. 負數防呆轉化：Math.abs 取絕對值，確保數值必為正
    let current = Math.abs(parseInt(cStr));
    let target = Math.abs(parseInt(tStr));
    let remMin = Math.abs(parseInt(rMStr));
    let reduction = Math.abs(parseFloat(redStr)) || 0;

    // 將修正後的數值填回欄位（視覺反饋）
    document.getElementById('current').value = current;
    document.getElementById('target').value = target;
    document.getElementById('remMin').value = remMin;
    document.getElementById('reduction').value = reduction;

    // 3. 邏輯判斷
    if (target <= current) {
        document.getElementById('waitText').innerText = "已達成目標";
        document.getElementById('finishTime').innerText = "現在已回滿";
        return;
    }

    // 計算邏輯
    const baseMin = 30;
    const realMinPerPoint = baseMin * (1 - reduction / 100);
    const totalMinNeeded = remMin + (target - current - 1) * realMinPerPoint;

    const hours = Math.floor(totalMinNeeded / 60);
    const mins = Math.round(totalMinNeeded % 60);

    const now = new Date();
    const finishDate = new Date(now.getTime() + totalMinNeeded * 60000);

    const month = (finishDate.getMonth() + 1).toString().padStart(2, '0');
    const date = finishDate.getDate().toString().padStart(2, '0');
    const hh = finishDate.getHours().toString().padStart(2, '0');
    const mm = finishDate.getMinutes().toString().padStart(2, '0');

    document.getElementById('waitText').innerText = `${hours} 小時 ${mins} 分`;
    document.getElementById('finishTime').innerText = `${month}/${date} ${hh}:${mm}`;
}
</script>

</body>
</html>
